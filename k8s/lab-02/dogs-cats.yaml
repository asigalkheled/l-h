apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: cats-rs

spec:
  replicas: 3

  selector:
    matchLabels:
      app: cats

  template:
    metadata:
      labels:
        app: cats

    spec:
      containers:
        - name: cats-container
          image: hashicorp/http-echo
          args:
            - "-text=Cats App"

          ports:
            - containerPort: 5678

---
apiVersion: v1
kind: Service
metadata:
  name: cats-service

spec:
  type: NodePort

  selector:
    app: cats

  ports:
    - port: 80
      targetPort: 5678
      nodePort: 30001

